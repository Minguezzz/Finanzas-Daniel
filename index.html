<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro Mayor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#0E1318;
  --surface:#161D24;
  --surface2:#1C252D;
  --border:#2A333D;
  --text:#ECE8DE;
  --muted:#8B94A3;
  --gold:#C9A227;
  --gold-soft:#E0BC4E;
  --green:#4FA873;
  --red:#C1543C;
  --amber:#D98E3B;
  --blue:#5B82B0;
  --yellow:#D9C23B;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
body{min-height:100vh;}
::selection{background:var(--gold);color:#1a1a1a;}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Fraunces',serif;}

button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

a{color:inherit;}

/* Layout */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:230px;
  flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:28px 18px;
  display:flex;
  flex-direction:column;
  gap:28px;
}
.brand{padding:0 6px;}
.brand .title{font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:0.3px;}
.brand .sub{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:0.4px;text-transform:uppercase;}
.brand .rule{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:14px;}

.nav{display:flex;flex-direction:column;gap:2px;}
.nav button{
  all:unset;
  display:flex;align-items:center;gap:10px;
  padding:11px 12px;border-radius:8px;
  color:var(--muted);font-size:14px;font-weight:500;
  transition:background .15s,color .15s;
}
.nav button:hover{background:var(--surface2);color:var(--text);}
.nav button.active{background:var(--surface2);color:var(--gold-soft);}
.nav button .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.55;flex-shrink:0;}

.sidebar-foot{margin-top:auto;color:var(--muted);font-size:11px;line-height:1.5;padding:0 6px;}

.main{flex:1;padding:36px 44px;max-width:1180px;}

.page-head{margin-bottom:28px;}
.page-head h1{font-family:'Fraunces',serif;font-weight:600;font-size:28px;margin:0 0 6px;}
.page-head p{color:var(--muted);margin:0;font-size:14px;}

/* Mobile top nav */
.mobile-nav{display:none;}

@media (max-width:880px){
  #app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;align-items:center;padding:16px;gap:14px;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;}
  .brand{padding:0;}
  .brand .rule{display:none;}
  .nav{flex-direction:row;}
  .sidebar-foot{display:none;}
  .main{padding:22px 18px;}
}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;margin-bottom:8px;}

.ccard{
  border-radius:16px;
  padding:22px;
  position:relative;
  overflow:hidden;
  min-height:170px;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.06);
  transition:transform .15s ease;
  background:linear-gradient(135deg,#3c4a59 0%,#161e26 100%);
  color:#fff;
}
.ccard:hover{transform:translateY(-2px);}
.ccard.selected{outline:2px solid var(--gold-soft);outline-offset:2px;}

/* American Express Bancolombia */
.ccard.amex-gold{background:linear-gradient(135deg,#caa53d 0%,#8a6a1d 55%,#5c4509 100%);color:#2b2210;}
.ccard.amex-platinum{background:linear-gradient(135deg,#d9d9d2 0%,#a6a69c 55%,#6e6e63 100%);color:#23231f;}
.ccard.amex-green{background:linear-gradient(135deg,#3f7d5c 0%,#1f4a36 100%);color:#fff;}
.ccard.amex-blue{background:linear-gradient(135deg,#3e6fa8 0%,#1a3454 100%);color:#fff;}
.ccard.amex-libre{background:linear-gradient(135deg,#2aa9a0 0%,#11605a 100%);color:#fff;}

/* Visa Bancolombia */
.ccard.visa-clasica{background:linear-gradient(135deg,#3a5a85 0%,#192c47 100%);color:#fff;}
.ccard.visa-platinum{background:linear-gradient(135deg,#6b7888 0%,#2a323d 100%);color:#fff;}
.ccard.visa-seleccion{background:linear-gradient(135deg,#1f3a63 0%,#0c1a30 100%);color:#fff;border-color:rgba(255,205,60,.25);}
.ccard.visa-lifemiles{background:linear-gradient(135deg,#2a86a8 0%,#0f3a4c 100%);color:#fff;}
.ccard.visa-infinite{background:linear-gradient(135deg,#15202e 0%,#020407 100%);color:#fff;border-color:rgba(201,162,39,0.35);}

/* Mastercard Bancolombia */
.ccard.mc-classic{background:linear-gradient(135deg,#55585c 0%,#1c1d1f 100%);color:#fff;}
.ccard.mc-gold{background:linear-gradient(135deg,#3a2f15 0%,#0c0a05 100%);color:#e6c97a;}
.ccard.mc-platinum{background:linear-gradient(135deg,#7c828a 0%,#23262a 100%);color:#fff;}
.ccard.mc-black{background:linear-gradient(135deg,#2a2a2a 0%,#070707 100%);color:#fff;}

/* Otros bancos */
.ccard.generic{background:linear-gradient(135deg,#3c4a59 0%,#161e26 100%);color:#fff;border-color:rgba(201,162,39,0.25);}

.ccard .row1{display:flex;justify-content:space-between;align-items:flex-start;}
.chip{width:34px;height:24px;border-radius:5px;background:linear-gradient(135deg,#d8d8d8,#9a9a9a);}
.ccard.amex-gold .chip,.ccard.amex-libre .chip,.ccard.mc-gold .chip{background:linear-gradient(135deg,#f0e2a8,#bda13c);}
.brandmark{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:18px;opacity:.92;}
.mc-circles{position:relative;width:48px;height:30px;}
.mc-circles span{position:absolute;top:0;width:30px;height:30px;border-radius:50%;}
.mc-circles span.r{background:#EB001B;left:0;opacity:.92;}
.mc-circles span.y{background:#F79E1B;left:18px;opacity:.85;mix-blend-mode:screen;}

.ccard .num{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:2px;opacity:.85;margin-top:14px;}
.ccard .label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.75;margin-bottom:2px;}
.ccard .name{font-weight:600;font-size:15px;}

.ccard .meter{height:5px;border-radius:3px;background:rgba(255,255,255,0.22);overflow:hidden;margin-top:14px;}
.ccard.amex-gold .meter,.ccard.amex-platinum .meter{background:rgba(0,0,0,0.18);}
.ccard .meter > div{height:100%;border-radius:3px;}
.ccard .meterinfo{display:flex;justify-content:space-between;font-size:11px;margin-top:6px;font-family:'JetBrains Mono',monospace;opacity:.85;}

/* Sections / surfaces */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px;}
.panel h2{font-family:'Fraunces',serif;font-size:18px;margin:0 0 16px;font-weight:600;}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 12px;font-weight:600;}

.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.stat .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;}
.stat .v.green{color:var(--green);}
.stat .v.red{color:var(--red);}
.stat .v.gold{color:var(--gold-soft);}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;align-items:end;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:6px;}
.field input,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:10px 11px;font-size:14px;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);}
.btn{
  background:var(--gold);color:#1a1a1a;border:none;border-radius:8px;padding:11px 18px;
  font-weight:600;font-size:13px;letter-spacing:.2px;transition:filter .15s;
}
.btn:hover{filter:brightness(1.08);}
.btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red);padding:6px 10px;font-size:12px;}
.btn.small{padding:7px 12px;font-size:12px;}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:0 10px 10px;border-bottom:1px solid var(--border);}
td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.amt{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;}
.amt.green{color:var(--green);}
.amt.red{color:var(--red);}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;}
.badge.cuenta{background:rgba(217,194,59,.18);color:var(--yellow);}
.badge.efectivo{background:rgba(79,168,115,.18);color:var(--green);}
.badge.capital{background:rgba(217,142,59,.18);color:var(--amber);}
.badge.debe{background:rgba(193,84,60,.18);color:var(--red);}
.badge.gasto{background:rgba(193,84,60,.15);color:var(--red);}
.badge.abono{background:rgba(79,168,115,.15);color:var(--green);}

.badge-select{border:none;border-radius:20px;padding:5px 10px;font-size:11px;font-weight:600;letter-spacing:.2px;cursor:pointer;}
.badge-select.cuenta{background:rgba(217,194,59,.18);color:var(--yellow);}
.badge-select.efectivo{background:rgba(79,168,115,.18);color:var(--green);}
.badge-select.capital{background:rgba(217,142,59,.18);color:var(--amber);}
.badge-select.debe{background:rgba(193,84,60,.18);color:var(--red);}
.badge-select option{background:var(--surface2);color:var(--text);}

.empty{color:var(--muted);font-size:13px;padding:18px 4px;text-align:center;}

.tabsrow{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tabsrow button{
  all:unset;cursor:pointer;padding:8px 16px;border-radius:20px;border:1px solid var(--border);
  font-size:13px;color:var(--muted);
}
.tabsrow button.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);font-weight:600;}

.flexbetween{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}

.progress-track{height:8px;border-radius:5px;background:var(--surface2);overflow:hidden;}
.progress-track > div{height:100%;border-radius:5px;background:var(--green);}

.debtcard{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;}

.capital-hero{
  background:linear-gradient(135deg,var(--surface2),var(--surface));
  border:1px solid var(--border);border-radius:14px;padding:30px;margin-bottom:22px;text-align:center;
}
.capital-hero .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;}
.capital-hero .v{font-family:'Fraunces',serif;font-size:44px;font-weight:700;color:var(--gold-soft);margin-top:8px;}

.iconbtn{all:unset;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px;font-size:13px;}
.iconbtn:hover{background:rgba(193,84,60,.12);color:var(--red);}

.detail-back{all:unset;cursor:pointer;color:var(--muted);font-size:13px;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;}
.detail-back:hover{color:var(--text);}

/* Login screen */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 30px;}
.login-box .title{font-family:'Fraunces',serif;font-weight:700;font-size:24px;text-align:center;margin-bottom:6px;}
.login-box .sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:26px;}
.login-box .field{margin-bottom:14px;}
.login-box .btn{width:100%;padding:12px;margin-top:6px;}
.login-box .switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted);}
.login-box .switch a{color:var(--gold-soft);cursor:pointer;text-decoration:underline;}
.login-error{background:rgba(193,84,60,.12);border:1px solid rgba(193,84,60,.3);color:var(--red);border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;}
.login-loading{color:var(--muted);text-align:center;padding:60px 20px;font-size:14px;}
.logout-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.logout-row button{all:unset;cursor:pointer;color:var(--muted);font-size:11px;text-decoration:underline;}
.logout-row button:hover{color:var(--red);}
</style>

<script>
let data = null;
let view = 'resumen';
let selectedCard = null;
let selectedDebt = null;
let selectedLoan = null;
let showAddCard = false;
let confirmDeleteCard = false;
let confirmDeleteDebt = null;
let confirmDeleteLoan = null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

const BRAND_LABELS = { amex:'American Express', visa:'Visa', mc:'Mastercard', generic:'Otro banco' };
const CATEGORY_OPTIONS = {
  amex:[ ['blue','Blue'], ['green','Green'], ['gold','Gold'], ['platinum','Platinum'], ['libre','Libre'] ],
  visa:[ ['clasica','Clásica'], ['platinum','Platinum'], ['seleccion','Selección Colombia'], ['lifemiles','LifeMiles'], ['infinite','Infinite'] ],
  mc:[ ['classic','Classic'], ['gold','Gold'], ['platinum','Platinum'], ['black','Black'] ],
};
function categoryLabel(brand, category){
  const opts = CATEGORY_OPTIONS[brand];
  if(!opts) return category || '';
  const found = opts.find(o=>o[0]===category);
  return found ? found[1] : (category||'');
}

function defaultData(){
  return {
    cards:[
      {id:'amex', name:'American Express Gold', last4:'6296', brand:'amex', category:'gold', limit:23000000},
      {id:'visa', name:'Visa Personal', last4:'0402', brand:'visa', category:'clasica', limit:3000000},
      {id:'mc', name:'Mastercard Black', last4:'8824', brand:'mc', category:'black', limit:22000000},
    ],
    transactions:[], // {id, cardId, date, concept, value, tipo:'gasto'|'abono', estado:'propio'|'medeben'|'capital'}
    debts:[
      {id:'libreinversion', name:'Crédito Libre Inversión', original:2219572},
      {id:'nequi', name:'Nequi', original:8008186},
    ],
    debtPayments:[], // {id, debtId, date, concept, value}
    loans:[], // {id, name, amount, date}
    loanPayments:[], // {id, loanId, date, concept, value}
    capitalEntries:[], // {id, date, concept, value, tipo:'ingreso'|'retiro'}
  };
}

let authView = 'login'; // 'login' | 'signup'
let authError = '';
let authBusy = false;

async function loadData(){
  try{
    const snap = await window.fbGetDoc();
    if(snap.exists() && snap.data().payload){ data = JSON.parse(snap.data().payload); }
  }catch(e){ console.error('firestore read error', e); }
  if(!data){ data = defaultData(); await saveData(); }
  else{
    if(!data.loans) data.loans = [];
    if(!data.loanPayments) data.loanPayments = [];
    let migrated = false;
    (data.cards||[]).forEach(c=>{
      if(!['amex','visa','mc','generic'].includes(c.brand)){ c.brand='generic'; migrated=true; }
      if(c.category===undefined || c.category===null){
        c.category = c.brand==='amex' ? 'gold' : c.brand==='visa' ? 'clasica' : c.brand==='mc' ? 'black' : '';
        migrated = true;
      }
    });
    (data.transactions||[]).forEach(t=>{
      if(t.estado==='propio'){ t.estado='cuenta'; migrated=true; }
      else if(t.estado==='medeben'){ t.estado='debe'; migrated=true; }
    });
    if(migrated) await saveData();
  }
  render();
}

async function saveData(){
  try{ await window.fbSetDoc({ payload: JSON.stringify(data) }); }
  catch(e){ console.error('firestore write error', e); }
}

/* ---------- AUTH UI ---------- */
function renderAuth(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="title">Libro Mayor</div>
        <div class="sub">${authView==='login' ? 'Inicia sesión para ver tus datos' : 'Crea tu cuenta para empezar'}</div>
        ${authError ? `<div class="login-error">${escapeHtml(authError)}</div>` : ''}
        <form id="authForm">
          <div class="field"><label>Correo electrónico</label><input type="email" name="email" required autocomplete="email"></div>
          <div class="field"><label>Contraseña</label><input type="password" name="password" required autocomplete="${authView==='login'?'current-password':'new-password'}" minlength="6"></div>
          <button class="btn" type="submit" ${authBusy?'disabled':''}>${authBusy ? 'Un momento...' : (authView==='login' ? 'Entrar' : 'Crear cuenta')}</button>
        </form>
        <div class="switch">
          ${authView==='login'
            ? `¿No tienes cuenta? <a id="toSignup">Créala aquí</a>`
            : `¿Ya tienes cuenta? <a id="toLogin">Inicia sesión</a>`}
        </div>
      </div>
    </div>
  `;
  document.getElementById('authForm').onsubmit = async (e)=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const email = f.get('email'), password = f.get('password');
    authBusy = true; authError=''; renderAuth();
    try{
      if(authView==='login'){
        await window.fbSignIn(window.fbAuth, email, password);
      }else{
        await window.fbCreateUser(window.fbAuth, email, password);
      }
      // onAuthReady will fire and render the app
    }catch(err){
      authError = translateFirebaseError(err.code);
      authBusy = false;
      renderAuth();
    }
  };
  const toSignup = document.getElementById('toSignup');
  if(toSignup) toSignup.onclick = ()=>{ authView='signup'; authError=''; renderAuth(); };
  const toLogin = document.getElementById('toLogin');
  if(toLogin) toLogin.onclick = ()=>{ authView='login'; authError=''; renderAuth(); };
}

function translateFirebaseError(code){
  const map = {
    'auth/invalid-email':'Correo electrónico no válido.',
    'auth/user-not-found':'No existe una cuenta con ese correo.',
    'auth/wrong-password':'Contraseña incorrecta.',
    'auth/invalid-credential':'Correo o contraseña incorrectos.',
    'auth/email-already-in-use':'Ya existe una cuenta con ese correo. Inicia sesión.',
    'auth/weak-password':'La contraseña debe tener al menos 6 caracteres.',
    'auth/network-request-failed':'Error de conexión. Revisa tu internet.',
    'auth/too-many-requests':'Demasiados intentos. Espera un momento e inténtalo de nuevo.',
  };
  return map[code] || 'Ocurrió un error. Intenta de nuevo.';
}

document.getElementById('app').innerHTML = `<div class="login-loading">Cargando...</div>`;

window.onAuthReady = async (user)=>{
  if(user){
    data = null;
    await loadData();
  }else{
    authBusy = false;
    renderAuth();
  }
};

function fmt(n){
  const v = Math.round(n||0);
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(v);
}
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});
}
function today(){ return new Date().toISOString().slice(0,10); }

/* ---------- computations ---------- */
function cardTx(cardId){ return data.transactions.filter(t=>t.cardId===cardId); }
function cardBalance(cardId){
  return cardTx(cardId).reduce((s,t)=> s + (t.tipo==='gasto'? t.value : -t.value), 0);
}
function cardMeDeben(cardId){
  return cardTx(cardId).filter(t=>t.estado==='debe' && t.tipo==='gasto').reduce((s,t)=>s+t.value,0);
}
function cardCapitalCovered(cardId){
  return cardTx(cardId).filter(t=>t.estado==='capital' && t.tipo==='gasto').reduce((s,t)=>s+t.value,0);
}
function debtPaid(debtId){
  return data.debtPayments.filter(p=>p.debtId===debtId).reduce((s,p)=>s+p.value,0);
}
function debtRemaining(debt){ return debt.original - debtPaid(debt.id); }
function loanPaid(loanId){
  return data.loanPayments.filter(p=>p.loanId===loanId).reduce((s,p)=>s+p.value,0);
}
function loanRemaining(loan){ return loan.amount - loanPaid(loan.id); }
function totalLoansOutstanding(){
  return data.loans.reduce((s,l)=>s+loanRemaining(l),0);
}
function allDeudores(){
  const list = [];
  data.transactions.filter(t=>t.estado==='debe' && t.tipo==='gasto').forEach(t=>{
    const c = data.cards.find(x=>x.id===t.cardId);
    list.push({...t, source:'tarjeta', origen: c?c.name:'—'});
  });
  data.loans.forEach(l=>{
    const remaining = loanRemaining(l);
    if(remaining > 0){
      list.push({ id:l.id, date:l.date, concept:l.name, value:remaining, source:'prestamo', origen:'Préstamo', loanId:l.id });
    }
  });
  return list.sort((a,b)=>b.date.localeCompare(a.date));
}
function totalCapitalUsedInCards(){
  return data.transactions.filter(t=>t.estado==='capital').reduce((s,t)=>s+t.value,0);
}
function capitalTotal(){
  const base = data.capitalEntries.reduce((s,e)=> s + (e.tipo==='retiro'? -e.value : e.value), 0);
  const loaned = data.loans.reduce((s,l)=>s+l.amount,0);
  const repaid = data.loanPayments.reduce((s,p)=>s+p.value,0);
  const usedInCards = totalCapitalUsedInCards();
  return base - loaned + repaid - usedInCards;
}

            <button class="btn small" style="background:var(--red);color:#fff;" data-confirmdeleteloan="${l.id}">Sí, eliminar</button>
          `:`<button class="btn danger" data-deleteloan="${l.id}">Eliminar préstamo</button>`}
        </div>
      </div>

      ${open?`
        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px;">
          <form class="form-grid" data-loanabonoform="${l.id}">
            <div class="field"><label>Fecha</label><input type="date" name="date" value="${today()}" required></div>
            <div class="field" style="grid-column:span 2;"><label>Concepto</label><input type="text" name="concept" placeholder="Ej. Abono de mayo" required></div>
            <div class="field"><label>Valor</label><input type="number" name="value" min="1" step="1" required></div>
            <div class="field"><button class="btn small" type="submit">Abonar</button></div>
          </form>
          ${payments.length===0?`<div class="empty">Sin abonos todavía.</div>`:`
          <table style="margin-top:14px;">
            <thead><tr><th>Fecha</th><th>Concepto</th><th style="text-align:right">Valor</th><th></th></tr></thead>
            <tbody>
              ${payments.map(p=>`
                <tr>
                  <td class="mono">${fmtDate(p.date)}</td>
                  <td>${escapeHtml(p.concept)}</td>
                  <td class="amt green">+${fmt(p.value)}</td>
                  <td><button class="iconbtn" data-delloanpayment="${p.id}">✕</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
        </div>
      `:''}
    </div>
  `;
}

/* ---------- CAPITAL ---------- */
function capitalView(){
  const total = capitalTotal();
  const entries = data.capitalEntries.slice().sort((a,b)=>b.date.localeCompare(a.date));
  return `
    <div class="page-head">
      <h1>Capital</h1>
      <p>El dinero que va creciendo, fuera de tarjetas y deudas.</p>
    </div>

    <div class="capital-hero">
      <div class="l">Capital actual</div>
      <div class="v">${fmt(total)}</div>
      ${totalLoansOutstanding()>0?`<div style="color:var(--muted);font-size:12px;margin-top:8px;">Incluye ${fmt(totalLoansOutstanding())} prestado(s) pendiente(s) de cobro, descontado del capital disponible</div>`:''}
      ${totalCapitalUsedInCards()>0?`<div style="color:var(--muted);font-size:12px;margin-top:4px;">Incluye ${fmt(totalCapitalUsedInCards())} ya descontado(s) por movimientos de tarjeta marcados como "Capital"</div>`:''}
    </div>

    <div class="panel">
      <h3>Nuevo movimiento de capital</h3>
      <form id="capForm" class="form-grid">
        <div class="field"><label>Fecha</label><input type="date" name="date" value="${today()}" required></div>
        <div class="field" style="grid-column:span 2;"><label>Concepto</label><input type="text" name="concept" placeholder="Ej. Ganancia del taller, ahorro del mes..." required></div>
        <div class="field"><label>Valor</label><input type="number" name="value" min="1" step="1" required></div>
        <div class="field"><label>Tipo</label>
          <select name="tipo">
            <option value="ingreso">Ingreso</option>
            <option value="retiro">Retiro</option>
          </select>
        </div>
        <div class="field"><button class="btn" type="submit">Agregar</button></div>
      </form>
    </div>

    <div class="panel">
      <h2>Movimientos de capital</h2>
      ${entries.length===0?`<div class="empty">Aún no has registrado movimientos de capital.</div>`:`
      <table>
        <thead><tr><th>Fecha</th><th>Concepto</th><th>Tipo</th><th style="text-align:right">Valor</th><th></th></tr></thead>
        <tbody>
          ${entries.map(e=>`
            <tr>
              <td class="mono">${fmtDate(e.date)}</td>
              <td>${escapeHtml(e.concept)}</td>
              <td><span class="badge ${e.tipo==='retiro'?'gasto':'abono'}">${e.tipo==='retiro'?'Retiro':'Ingreso'}</span></td>
              <td class="amt ${e.tipo==='retiro'?'red':'green'}">${e.tipo==='retiro'?'−':'+'}${fmt(e.value)}</td>
              <td><button class="iconbtn" data-delcap="${e.id}">✕</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      `}
    </div>
  `;
}

/* ---------- helpers ---------- */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------- handlers ---------- */
function attachHandlers(){
  document.querySelectorAll('[data-card]').forEach(el=>{
    el.onclick = ()=>{ selectedCard = el.dataset.card; confirmDeleteCard=false; render(); };
  });

  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = ()=>{ selectedCard=null; confirmDeleteCard=false; render(); };

  const toggleAddCard = document.getElementById('toggleAddCard');
  if(toggleAddCard) toggleAddCard.onclick = ()=>{ showAddCard = !showAddCard; render(); };

  const brandSelect = document.getElementById('brandSelect');
  const categoryField = document.getElementById('categoryField');
  const categorySelect = document.getElementById('categorySelect');
  const customCategoryField = document.getElementById('customCategoryField');
  function syncCategoryOptions(){
    if(!brandSelect) return;
    const brand = brandSelect.value;
    const opts = CATEGORY_OPTIONS[brand];
    if(opts){
      categorySelect.innerHTML = opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join('');
      categoryField.style.display = '';
      customCategoryField.style.display = 'none';
    }else{
      categoryField.style.display = 'none';
      customCategoryField.style.display = '';
    }
  }
  if(brandSelect){ syncCategoryOptions(); brandSelect.onchange = syncCategoryOptions; }

  const addCardForm = document.getElementById('addCardForm');
  if(addCardForm) addCardForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = new FormData(addCardForm);
    const brand = f.get('brand');
    const category = CATEGORY_OPTIONS[brand] ? f.get('category') : (f.get('customCategory')||'').trim();
    data.cards.push({
      id:uid(), name:f.get('name').trim(), last4:f.get('last4').trim(),
      brand, category, limit:Number(f.get('limit'))
    });
    showAddCard = false;
    await saveData(); render();
  };

  const deleteCardBtn = document.getElementById('deleteCardBtn');
  if(deleteCardBtn) deleteCardBtn.onclick = ()=>{ confirmDeleteCard = true; render(); };

  const cancelDeleteCard = document.getElementById('cancelDeleteCard');
  if(cancelDeleteCard) cancelDeleteCard.onclick = ()=>{ confirmDeleteCard = false; render(); };

  const confirmDeleteCardBtn = document.getElementById('confirmDeleteCardBtn');
  if(confirmDeleteCardBtn) confirmDeleteCardBtn.onclick = async ()=>{
    data.cards = data.cards.filter(c=>c.id!==selectedCard);
    data.transactions = data.transactions.filter(t=>t.cardId!==selectedCard);
    selectedCard = null; confirmDeleteCard = false;
    await saveData(); render();
  };

  const txForm = document.getElementById('txForm');
  if(txForm) txForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = new FormData(txForm);
    data.transactions.push({
      id:uid(), cardId:selectedCard,
      date:f.get('date'), concept:f.get('concept').trim(),
      value:Number(f.get('value')), tipo:f.get('tipo'), estado:f.get('estado')
    });
    await saveData(); render();
  };

  document.querySelectorAll('[data-deltx]').forEach(b=>{
    b.onclick = async ()=>{
      data.transactions = data.transactions.filter(t=>t.id!==b.dataset.deltx);
      await saveData(); render();
    };
  });

  const debtForm = document.getElementById('debtForm');
  if(debtForm) debtForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = new FormData(debtForm);
    data.debts.push({ id:uid(), name:f.get('name').trim(), original:Number(f.get('original')) });
    await saveData(); render();
  };

  document.querySelectorAll('[data-toggledebt]').forEach(b=>{
    b.onclick = ()=>{ selectedDebt = selectedDebt===b.dataset.toggledebt? null : b.dataset.toggledebt; confirmDeleteDebt=null; render(); };
  });

  document.querySelectorAll('[data-deletedebt]').forEach(b=>{
    b.onclick = ()=>{ confirmDeleteDebt = b.dataset.deletedebt; render(); };
  });
  document.querySelectorAll('[data-canceldeletedebt]').forEach(b=>{
    b.onclick = ()=>{ confirmDeleteDebt = null; render(); };
  });
  document.querySelectorAll('[data-confirmdeletedebt]').forEach(b=>{
    b.onclick = async ()=>{
      const id = b.dataset.confirmdeletedebt;
      data.debts = data.debts.filter(d=>d.id!==id);
      data.debtPayments = data.debtPayments.filter(p=>p.debtId!==id);
      confirmDeleteDebt = null; selectedDebt = null;
      await saveData(); render();
    };
  });

  document.querySelectorAll('[data-abonoform]').forEach(form=>{
    form.onsubmit = async (e)=>{
      e.preventDefault();
      const f = new FormData(form);
      data.debtPayments.push({
        id:uid(), debtId:form.dataset.abonoform,
        date:f.get('date'), concept:f.get('concept').trim(), value:Number(f.get('value'))
      });
      await saveData(); render();
    };
  });

  document.querySelectorAll('[data-delpayment]').forEach(b=>{
    b.onclick = async ()=>{
      data.debtPayments = data.debtPayments.filter(p=>p.id!==b.dataset.delpayment);
      await saveData(); render();
    };
  });

  const loanForm = document.getElementById('loanForm');
  if(loanForm) loanForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = new FormData(loanForm);
    data.loans.push({ id:uid(), name:f.get('name').trim(), amount:Number(f.get('amount')), date:f.get('date') });
    await saveData(); render();
  };

  document.querySelectorAll('[data-toggleloan]').forEach(b=>{
    b.onclick = ()=>{ selectedLoan = selectedLoan===b.dataset.toggleloan? null : b.dataset.toggleloan; confirmDeleteLoan=null; render(); };
  });

  document.querySelectorAll('[data-viewloan]').forEach(b=>{
    b.onclick = ()=>{
      view = 'prestamos'; selectedLoan = b.dataset.viewloan; confirmDeleteLoan=null;
      render();
      const el = document.getElementById('loan-'+b.dataset.viewloan);
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    };
  });

  document.querySelectorAll('[data-deleteloan]').forEach(b=>{
    b.onclick = ()=>{ confirmDeleteLoan = b.dataset.deleteloan; render(); };
  });
  document.querySelectorAll('[data-canceldeleteloan]').forEach(b=>{
    b.onclick = ()=>{ confirmDeleteLoan = null; render(); };
  });
  document.querySelectorAll('[data-confirmdeleteloan]').forEach(b=>{
    b.onclick = async ()=>{
      const id = b.dataset.confirmdeleteloan;
      data.loans = data.loans.filter(l=>l.id!==id);
      data.loanPayments = data.loanPayments.filter(p=>p.loanId!==id);
      confirmDeleteLoan = null; selectedLoan = null;
      await saveData(); render();
    };
  });

  document.querySelectorAll('[data-loanabonoform]').forEach(form=>{
    form.onsubmit = async (e)=>{
      e.preventDefault();
      const f = new FormData(form);
      data.loanPayments.push({
        id:uid(), loanId:form.dataset.loanabonoform,
        date:f.get('date'), concept:f.get('concept').trim(), value:Number(f.get('value'))
      });
      await saveData(); render();
    };
  });

  document.querySelectorAll('[data-delloanpayment]').forEach(b=>{
    b.onclick = async ()=>{
      data.loanPayments = data.loanPayments.filter(p=>p.id!==b.dataset.delloanpayment);
      await saveData(); render();
    };
  });

  document.querySelectorAll('[data-txestado]').forEach(sel=>{
    sel.onchange = async ()=>{
      const t = data.transactions.find(x=>x.id===sel.dataset.txestado);
      if(t) t.estado = sel.value;
      await saveData(); render();
    };
  });

  document.querySelectorAll('[data-deldeudor]').forEach(b=>{
    b.onclick = async ()=>{
      data.transactions = data.transactions.filter(t=>t.id!==b.dataset.deldeudor);
      await saveData(); render();
    };
  });

  const capForm = document.getElementById('capForm');
  if(capForm) capForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = new FormData(capForm);
    data.capitalEntries.push({
      id:uid(), date:f.get('date'), concept:f.get('concept').trim(),
      value:Number(f.get('value')), tipo:f.get('tipo')
    });
    await saveData(); render();
  };

  document.querySelectorAll('[data-delcap]').forEach(b=>{
    b.onclick = async ()=>{
      data.capitalEntries = data.capitalEntries.filter(e=>e.id!==b.dataset.delcap);
      await saveData(); render();
    };
  });
}

</script>
</body>
</html>
